<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
    <link rel="icon" href="{{ '/assets/logo.png' | relative_url }}" type="image/png">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true
        },
        options: {
          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
        }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  </head>
  <body>
    <header class="masthead">
      <div class="masthead__inner-wrap">
        <nav class="greedy-nav" aria-label="Primary navigation">
          <a class="site-logo" href="{{ '/' | relative_url }}">
            <img src="{{ '/assets/logo.png' | relative_url }}" alt="{{ site.title }}">
          </a>
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <ul class="visible-links">
            <li class="masthead__menu-item"><a href="{{ '/' | relative_url }}">Home</a></li>
            <li class="masthead__menu-item"><a href="{{ '/agent-team/' | relative_url }}">Agent Team</a></li>
            <li class="masthead__menu-item"><a href="{{ '/researchers/' | relative_url }}">Researchers</a></li>
            <li class="masthead__menu-item"><a href="{{ '/publications/' | relative_url }}">Publications</a></li>
            <li class="masthead__menu-item"><a href="{{ '/blogs/' | relative_url }}">Blogs</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main" class="initial-content">
      {{ content }}
    </main>

    <footer class="page__footer">
      <div class="page__footer-inner">
        <p>© {{ site.time | date: "%Y" }} {{ site.title }}</p>
      </div>
    </footer>
  </body>
</html>
